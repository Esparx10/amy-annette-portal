<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Amy & Annette — WFS Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--bg:#08090d;--card:#12141c;--card2:#1a1d28;--border:#252836;--text:#e8eaed;--text2:#8b8fa3;--accent:#c9a227;--accent2:#e8be3a;--accentBg:rgba(201,162,39,0.08);--blue:#4a8fe7;--green:#34c759;--red:#ff453a;--orange:#ff9f0a;--purple:#bf5af2;--radius:14px;--shadow:0 2px 12px rgba(0,0,0,0.3)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.app{max-width:1200px;margin:0 auto;padding:16px 20px 40px}
/* ─ Header ─ */
.header{display:flex;align-items:center;justify-content:space-between;padding:20px 0 24px;border-bottom:1px solid var(--border);margin-bottom:24px;flex-wrap:wrap;gap:12px}
.logo{display:flex;align-items:center;gap:12px}
.logo-mark{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--accent),#8b6914);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;box-shadow:0 4px 16px rgba(201,162,39,0.25)}
.logo h1{font-size:18px;font-weight:800;letter-spacing:-0.3px}
.logo h1 span{color:var(--accent)}
.logo-sub{font-size:11px;color:var(--text2);font-weight:500;letter-spacing:0.5px}
.header-right{display:flex;gap:8px;align-items:center}
/* ─ Stats Row ─ */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;position:relative;overflow:hidden;transition:border-color 0.2s,transform 0.15s}
.stat-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stat-card:nth-child(1)::before{background:var(--accent)}
.stat-card:nth-child(2)::before{background:var(--green)}
.stat-card:nth-child(3)::before{background:var(--blue)}
.stat-card:nth-child(4)::before{background:var(--purple)}
.stat-num{font-size:28px;font-weight:800;letter-spacing:-1px;line-height:1}
.stat-lbl{font-size:11px;color:var(--text2);margin-top:6px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
/* ─ Search ─ */
.search-row{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.search-box{flex:1;min-width:200px;position:relative}
.search-box input{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:12px 16px 12px 42px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color 0.2s}
.search-box input:focus{border-color:var(--accent)}
.search-box input::placeholder{color:var(--text2)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:16px;pointer-events:none}
/* ─ Tabs ─ */
.tabs{display:flex;gap:2px;background:var(--card);border-radius:12px;padding:4px;margin-bottom:20px;overflow-x:auto;border:1px solid var(--border)}
.tab{padding:10px 18px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text2);white-space:nowrap;transition:all 0.2s;text-align:center}
.tab:hover{color:var(--text)}
.tab.on{background:var(--accent);color:#000;font-weight:700}
.cnt{background:var(--card2);color:var(--text2);font-size:10px;padding:1px 6px;border-radius:8px;margin-left:4px;font-weight:700}
/* ─ Table ─ */
.tbl-wrap{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.tbl-scroll{max-height:520px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--card);color:var(--text2);padding:12px 14px;text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;position:sticky;top:0;z-index:2;cursor:pointer;user-select:none;border-bottom:1px solid var(--border)}
th:hover{color:var(--accent)}
td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(201,162,39,0.03)}
.sku-link{color:var(--blue);font-weight:700;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.3px;transition:color 0.15s}
.sku-link:hover{color:var(--accent2);text-decoration:underline}
.mono{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.3px}
.qty{color:var(--green);font-weight:700}
.total{color:var(--orange);font-weight:800;font-family:'JetBrains Mono',monospace;font-size:12px}
.tag{display:inline-flex;align-items:center;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:0.3px}
.tag-gdm{background:rgba(201,162,39,0.12);color:var(--accent2)}
.tag-wfa{background:rgba(74,143,231,0.12);color:var(--blue)}
.tag-na{background:rgba(139,143,163,0.1);color:var(--text2)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-state .em{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px;line-height:1.6}
/* ─ Detail View ─ */
.back{display:inline-flex;align-items:center;gap:6px;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;margin-bottom:16px;transition:color 0.15s}
.back:hover{color:var(--accent)}
.det-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.det-head h2{font-size:24px;font-weight:800;font-family:'JetBrains Mono',monospace;letter-spacing:-0.5px}
.det-head h2 span{color:var(--blue)}
.det-pills{display:flex;gap:8px;flex-wrap:wrap}
.det-pill{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 14px;text-align:center}
.det-pill .v{font-size:18px;font-weight:800;color:var(--accent)}
.det-pill .l{font-size:9px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}
/* ─ Form ─ */
.form-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:520px}
.form-card h3{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field label{display:block;font-size:11px;color:var(--text2);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.field input,.field select{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:border-color 0.2s}
.field input:focus{border-color:var(--accent)}
.field input::placeholder{color:#555}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:10px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;transition:all 0.15s}
.btn-gold{background:linear-gradient(135deg,var(--accent),#a68520);color:#000;box-shadow:0 4px 12px rgba(201,162,39,0.25)}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(201,162,39,0.35)}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--text2)}
.btn-ghost:hover{border-color:var(--text);color:var(--text)}
/* ─ Toast ─ */
.toast{position:fixed;bottom:24px;right:24px;background:var(--green);color:#000;padding:14px 22px;border-radius:12px;font-weight:700;font-size:13px;z-index:100;opacity:0;transform:translateY(16px);transition:all 0.3s;box-shadow:0 8px 24px rgba(52,199,89,0.3)}
.toast.on{opacity:1;transform:translateY(0)}
/* ─ Responsive ─ */
@media(max-width:600px){.stats{grid-template-columns:1fr 1fr}.form-grid{grid-template-columns:1fr}.det-head{flex-direction:column}.header{flex-direction:column;align-items:flex-start}}
/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.stat-card,.tbl-wrap,.form-card{animation:fadeUp 0.4s ease both}
.stat-card:nth-child(2){animation-delay:0.05s}.stat-card:nth-child(3){animation-delay:0.1s}.stat-card:nth-child(4){animation-delay:0.15s}
</style>
</head>

<script>
// ─── SQL.js Database Layer ───
const DB_NAME = 'wfs_tracker_db';
const DB_STORE = 'sqlitedb';

// Save SQLite DB bytes to IndexedDB
function saveDBToIndexedDB(db) {
  return new Promise((resolve, reject) => {
    const data = db.export();
    const buffer = new Uint8Array(data);
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(DB_STORE);
    req.onsuccess = e => {
      const tx = e.target.result.transaction(DB_STORE, 'readwrite');
      tx.objectStore(DB_STORE).put(buffer, 'db');
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    };
    req.onerror = () => reject(req.error);
  });
}

// Load SQLite DB bytes from IndexedDB
function loadDBFromIndexedDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(DB_STORE);
    req.onsuccess = e => {
      const tx = e.target.result.transaction(DB_STORE, 'readonly');
      const get = tx.objectStore(DB_STORE).get('db');
      get.onsuccess = () => resolve(get.result || null);
      get.onerror = () => reject(get.error);
    };
    req.onerror = () => reject(req.error);
  });
}

// Initialize database
async function initDB() {
  const SQL = await initSqlJs({
    locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${file}`
  });

  let db;
  const saved = await loadDBFromIndexedDB();
  if (saved) {
    db = new SQL.Database(saved);
  } else {
    db = new SQL.Database();
    db.run(`CREATE TABLE IF NOT EXISTS shipments (
      id INTEGER PRIMARY KEY AUTOINCREMENT,
      sku TEXT NOT NULL,
      qty INTEGER NOT NULL,
      date TEXT NOT NULL,
      gdm TEXT NOT NULL,
      total INTEGER NOT NULL,
      created_at TEXT DEFAULT (datetime('now'))
    )`);
    db.run(`CREATE INDEX IF NOT EXISTS idx_sku ON shipments(sku)`);
    db.run(`CREATE INDEX IF NOT EXISTS idx_gdm ON shipments(gdm)`);

    // Migrate existing localStorage data if any
    try {
      const ls = localStorage.getItem('wfs_add');
      if (ls) {
        const oldAdds = JSON.parse(ls);
        const stmt = db.prepare('INSERT INTO shipments (sku, qty, date, gdm, total) VALUES (?, ?, ?, ?, ?)');
        for (const [sku, recs] of Object.entries(oldAdds)) {
          for (const r of recs) {
            stmt.run([sku.toUpperCase(), r.qty, r.date, r.gdm, r.total || 0]);
          }
        }
        stmt.free();
        await saveDBToIndexedDB(db);
        console.log('Migrated localStorage data to SQLite');
      }
    } catch (e) { console.warn('Migration skip:', e); }
  }

  // Ensure table exists (in case of old DB without it)
  db.run(`CREATE TABLE IF NOT EXISTS shipments (
    id INTEGER PRIMARY KEY AUTOINCREMENT,
    sku TEXT NOT NULL,
    qty INTEGER NOT NULL,
    date TEXT NOT NULL,
    gdm TEXT NOT NULL,
    total INTEGER NOT NULL,
    created_at TEXT DEFAULT (datetime('now'))
  )`);
  db.run(`CREATE INDEX IF NOT EXISTS idx_sku ON shipments(sku)`);
  db.run(`CREATE INDEX IF NOT EXISTS idx_gdm ON shipments(gdm)`);

  return db;
}

// Global DB reference — set before React renders
window.__wfsDB = null;
window.__wfsDBReady = initDB().then(db => {
  window.__wfsDB = db;
  return db;
});
</script>

        <tbody>{recs.map((r,i)=><tr key={i}>
          <td style={{color:'var(--text2)'}}>{i+1}</td>
          <td>{r.date}</td>
          <td className="qty">{r.qty} pcs</td>
          <td className="mono">{r.gdm}</td>
          <td>{tag(r.gdm)}</td>
          <td className="total">{admin?r.total.toLocaleString()+' pcs':'🔒'}</td>
        </tr>)}</tbody>
      </table></div></div>
    </div>);
  }

  return(<div>
    {/* Header */}
    <div className="header">
      <div className="logo">
        <div className="logo-mark">A&A</div>
        <div><h1>Walmart <span>WFS</span> Tracker</h1><div className="logo-sub">Amy & Annette Fulfillment Dashboard</div></div>
      </div>
    </div>

    {/* Stats */}
    <div className="stats">
      <div className="stat-card"><div className="stat-num" style={{color:'var(--accent)'}}>{totals.skus}</div><div className="stat-lbl">Active SKUs</div></div>
      <div className="stat-card"><div className="stat-num" style={{color:'var(--green)'}}>{admin?totals.pcs.toLocaleString():'🔒'}</div><div className="stat-lbl">Total Pieces Shipped</div></div>
      <div className="stat-card"><div className="stat-num" style={{color:'var(--blue)'}}>{totals.ship.toLocaleString()}</div><div className="stat-lbl">Shipment Records</div></div>
    </div>

    {/* Tabs */}
    <div className="tabs">
      {[['overview','📦 All SKUs'],['gdm','🔍 GDM Search'],['add','➕ Add Shipment'],['top','🏆 Top Volume'],['admin',admin?'🔓 Admin':'🔒 Admin']].map(([k,l])=>
        <div key={k} className={'tab'+(tab===k?' on':'')} onClick={()=>setTab(k)}>{l}</div>
      )}
    </div>

    {/* Overview Tab */}
    {tab==='overview'&&<div>
      <div className="search-row">
        <div className="search-box">
          <span className="search-icon">🔍</span>
          <input placeholder="Search SKU..." value={search} onChange={e=>setSearch(e.target.value)} />
        </div>
        <button className="btn btn-ghost" onClick={()=>doSort(sort.by==='sku'?'totalPcs':'sku')}>
          Sort: {sort.by==='sku'?'SKU':'Volume'} {sort.dir==='asc'?'↑':'↓'}
        </button>
      </div>
      <p style={{color:'var(--text2)',fontSize:12,marginBottom:10}}>{filtered.length} of {skuList.length} SKUs — tap any row for full history</p>
      <div className="tbl-wrap"><div className="tbl-scroll" style={{maxHeight:460}}><table>
        <thead><tr>
          <th onClick={()=>doSort('sku')}>SKU{arrow('sku')}</th>
          <th onClick={()=>doSort('totalPcs')}>Total Shipped{arrow('totalPcs')}</th>
          <th onClick={()=>doSort('shipments')}>Shipments{arrow('shipments')}</th>
          <th onClick={()=>doSort('lastDate')}>Last Ship{arrow('lastDate')}</th>
          <th>Last ID</th>
        </tr></thead>
        <tbody>{filtered.map(s=><tr key={s.sku} onClick={()=>setSel(s.sku)} style={{cursor:'pointer'}}>
          <td className="sku-link">{s.sku}</td>
          <td className="total">{admin?s.totalPcs.toLocaleString()+' pcs':'🔒'}</td>
          <td>{s.shipments}</td>
          <td>{s.lastDate}</td>
          <td><span className="mono" style={{marginRight:6}}>{s.lastGdm.length>10?s.lastGdm.slice(0,10)+'…':s.lastGdm}</span>{tag(s.lastGdm)}</td>
        </tr>)}</tbody>
      </table></div></div>
    </div>}

    {/* GDM Search Tab */}
    {tab==='gdm'&&<div>
      <div className="search-row">
        <div className="search-box" style={{flex:1}}>
          <span className="search-icon">🔍</span>
          <input placeholder="Enter GDM or WFA ID  (e.g. 4640121GDM, 2490262WFA)..." value={gdmQ} onChange={e=>setGdmQ(e.target.value)} />
        </div>
      </div>
      {gdmQ.length<3&&<div className="empty-state"><div className="em">🔎</div><p>Type at least 3 characters to search<br/>across all GDM and WFA shipment IDs</p></div>}
      {gdmQ.length>=3&&gdmResults.length===0&&<div className="empty-state"><div className="em">😕</div><p>No results for "<strong>{gdmQ}</strong>"<br/>Try a different ID</p></div>}
      {gdmResults.length>0&&<div>
        <p style={{color:'var(--green)',fontSize:13,fontWeight:700,marginBottom:10}}>✅ {gdmResults.length} match{gdmResults.length>1?'es':''} found</p>
        <div className="tbl-wrap"><div className="tbl-scroll"><table>
          <thead><tr><th>SKU</th><th>Qty</th><th>Date</th><th>GDM / WFA ID</th><th>Type</th><th>Running Total</th></tr></thead>
          <tbody>{gdmResults.map((r,i)=><tr key={i} style={{background:'rgba(201,162,39,0.04)'}}>
            <td className="sku-link" onClick={()=>setSel(r.sku)}>{r.sku}</td>
            <td className="qty">{r.qty} pcs</td>
            <td>{r.date}</td>
            <td className="mono">{r.gdm}</td>
            <td>{tag(r.gdm)}</td>
            <td className="total">{admin?r.total.toLocaleString()+' pcs':'🔒'}</td>
          </tr>)}</tbody>
        </table></div></div>
      </div>}
    </div>}

    {/* Add Shipment Tab */}
    {tab==='add'&&<div>
      <div className="form-card">
        <h3>📦 Log New Shipment</h3>
        <div className="form-grid">
          <div className="field"><label>SKU / Style #</label>
            <input placeholder="e.g. DBB128" value={form.sku} onChange={e=>setForm({...form,sku:e.target.value})} list="slist" />
            <datalist id="slist">{Object.keys(data).sort().map(s=><option key={s} value={s}/>)}</datalist>
          </div>
          <div className="field"><label>Quantity (pcs)</label>
            <input type="number" placeholder="150" value={form.qty} onChange={e=>setForm({...form,qty:e.target.value})} />
          </div>
          <div className="field"><label>Ship Date</label>
            <input type="date" value={form.date} onChange={e=>{const d=e.target.value;if(d){const[y,m,dy]=d.split('-');setForm({...form,date:m+'/'+dy+'/'+y})}}} />
          </div>
          <div className="field"><label>GDM / WFA ID</label>
            <input placeholder="e.g. 4640121GDM" value={form.gdm} onChange={e=>setForm({...form,gdm:e.target.value})} />
          </div>
        </div>
        <div style={{marginTop:16,display:'flex',gap:10}}>
          <button className="btn btn-gold" onClick={addShipment}>✅ Add Record</button>
          <button className="btn btn-ghost" onClick={()=>setForm({sku:'',qty:'',date:'',gdm:''})}>Clear</button>
        </div>
      </div>

      {/* ─── SYNC / EXPORT / IMPORT ─── */}
      <div style={{marginTop:20,display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,maxWidth:520}}>
        <div className="form-card" style={{padding:16,textAlign:'center'}}>
          <div style={{fontSize:28,marginBottom:6}}>📤</div>
          <h3 style={{fontSize:13,marginBottom:4,justifyContent:'center'}}>Export Data</h3>
          <p style={{color:'var(--text2)',fontSize:11,marginBottom:10}}>Download all your additions as a file you can load on any device</p>
          <button className="btn btn-gold" style={{width:'100%',justifyContent:'center',fontSize:12}} onClick={()=>{
            const allAdds=adds;
            const count=Object.values(allAdds).flat().length;
            if(count===0){flash('⚠️ No additions to export');return}
            const blob=new Blob([JSON.stringify(allAdds,null,2)],{type:'application/json'});
            const url=URL.createObjectURL(blob);
            const a=document.createElement('a');a.href=url;
            a.download='wfs_additions_'+new Date().toISOString().slice(0,10)+'.json';
            a.click();URL.revokeObjectURL(url);
            flash('📤 Exported '+count+' records');
          }}>⬇ Download Additions</button>
        </div>

        <div className="form-card" style={{padding:16,textAlign:'center'}}>
          <div style={{fontSize:28,marginBottom:6}}>📥</div>
          <h3 style={{fontSize:13,marginBottom:4,justifyContent:'center'}}>Import Data</h3>
          <p style={{color:'var(--text2)',fontSize:11,marginBottom:10}}>Load additions from another device or a previous export</p>
          <label className="btn btn-ghost" style={{width:'100%',justifyContent:'center',fontSize:12,cursor:'pointer',display:'flex'}}>
            📂 Load File
            <input type="file" accept=".json" style={{display:'none'}} onChange={e=>{
              const file=e.target.files[0];if(!file)return;
              const reader=new FileReader();
              reader.onload=ev=>{
                try{
                  const imported=JSON.parse(ev.target.result);
                  let count=0;
                  const newAdds={...adds};
                  const newData={...data};
                  for(const[sku,recs]of Object.entries(imported)){
                    if(!Array.isArray(recs))continue;
                    const k=sku.toUpperCase();
                    if(!newAdds[k])newAdds[k]=[];
                    if(!newData[k])newData[k]=[];
                    recs.forEach(r=>{
                      const dup=newAdds[k].some(x=>x.gdm===r.gdm&&x.date===r.date&&x.qty===r.qty);
                      if(!dup){newAdds[k].push(r);newData[k].push(r);count++}
                    });
                  }
                  setAdds(newAdds);setData(newData);
                  // SQL INSERT for imported records
                  if(dbRef.current){
                    const stmt=dbRef.current.prepare('INSERT INTO shipments (sku,qty,date,gdm,total) VALUES (?,?,?,?,?)');
                    for(const[sk,rs]of Object.entries(imported)){
                      const k2=sk.toUpperCase();
                      const existing=adds[k2]||[];
                      rs.forEach(r2=>{
                        const dup2=existing.some(x=>x.gdm===r2.gdm&&x.date===r2.date&&x.qty===r2.qty);
                        if(!dup2)stmt.run([k2,r2.qty,r2.date,r2.gdm,r2.total||0]);
                      });
                    }
                    stmt.free();persistDB();
                  }
                  flash('📥 Imported '+count+' new records'+(count===0?' (all duplicates skipped)':''));
                }catch(err){flash('⚠️ Invalid file format')}
              };
              reader.readAsText(file);
              e.target.value='';
            }} />
          </label>
        </div>
      </div>

      {/* ─── EXPORT FULL DATABASE ─── */}
      {admin&&<div style={{marginTop:12,maxWidth:520}}>
        <div className="form-card" style={{padding:16,textAlign:'center',borderColor:'var(--accent)'}}>
          <div style={{fontSize:28,marginBottom:6}}>💾</div>
          <h3 style={{fontSize:13,marginBottom:4,justifyContent:'center',color:'var(--accent)'}}>Export Full Database</h3>
          <p style={{color:'var(--text2)',fontSize:11,marginBottom:10}}>Admin only — download ALL data (base + additions) as one file</p>
          <button className="btn btn-gold" style={{width:'100%',justifyContent:'center',fontSize:12}} onClick={()=>{
            const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
            const url=URL.createObjectURL(blob);
            const a=document.createElement('a');a.href=url;
            a.download='wfs_full_database_'+new Date().toISOString().slice(0,10)+'.json';
            a.click();URL.revokeObjectURL(url);
            flash('💾 Full database exported ('+Object.keys(data).length+' SKUs)');
          }}>⬇ Download Full Database</button>
        </div>
      </div>}

      {/* Additions list */}
      {Object.keys(adds).length>0&&<div style={{marginTop:16}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <p style={{color:'var(--text2)',fontSize:12,fontWeight:600}}>📝 Your Additions ({Object.values(adds).flat().length})</p>
          <button className="btn btn-ghost" style={{fontSize:10,padding:'4px 10px'}} onClick={()=>{
            if(confirm('Clear all your additions? (Base data stays)')){
              setAdds({});
              if(dbRef.current){dbRef.current.run('DELETE FROM shipments');persistDB()}
              setData(()=>{const base={...D};return base});
              flash('🗑️ Additions cleared');
            }
          }}>🗑️ Clear All</button>
        </div>
        <div className="tbl-wrap"><div className="tbl-scroll" style={{maxHeight:200}}><table>
          <thead><tr><th>SKU</th><th>Qty</th><th>Date</th><th>ID</th></tr></thead>
          <tbody>{Object.entries(adds).flatMap(([sku,recs])=>recs.map((r,i)=><tr key={sku+i}>
            <td className="sku-link">{sku}</td><td className="qty">{r.qty} pcs</td><td>{r.date}</td><td className="mono">{r.gdm}</td>
          </tr>))}</tbody>
        </table></div></div>
      </div>}

      {/* How sync works */}
      <div style={{marginTop:16,background:'var(--card)',border:'1px solid var(--border)',borderRadius:12,padding:14,maxWidth:520}}>
        <h4 style={{color:'var(--accent)',fontSize:12,marginBottom:8}}>📱 How Data Sync Works</h4>
        <div style={{color:'var(--text2)',fontSize:11,lineHeight:1.7}}>
          <div>✅ <strong>Base data</strong> (112 SKUs, 2,741 records) is built into the app</div>
          <div>✅ <strong>New shipments</strong> you add are saved to SQLite database automatically</div>
          <div>📤 <strong>Export</strong> your additions to take them to another device</div>
          <div>📥 <strong>Import</strong> to load additions on a new device (duplicates auto-skipped)</div>
          <div>💾 <strong>Full DB export</strong> (admin) downloads everything as one file</div>
          <div>🗄️ <strong>SQL Database</strong> — all additions persist in browser SQLite via IndexedDB</div>
          <div style={{marginTop:6,color:'var(--accent)'}}>💡 Send new WFS data to Claude to rebuild with updated base data</div>
        </div>
      </div>
    </div>}

    {/* Top Volume Tab */}
    {tab==='top'&&<div>
      {!admin?<div className="empty-state"><div className="em">🔒</div><p>Admin access required to view volume data<br/>Go to the <strong>Admin</strong> tab to log in</p></div>
      :<div>
      <p style={{color:'var(--text2)',fontSize:12,marginBottom:12}}>Top 20 SKUs ranked by total pieces shipped to Walmart</p>
      <div className="tbl-wrap"><div className="tbl-scroll"><table>
        <thead><tr><th style={{width:36}}>#</th><th>SKU</th><th>Total Shipped</th><th>Shipments</th><th>First Ship</th><th>Last Ship</th></tr></thead>
        <tbody>{[...skuList].sort((a,b)=>b.totalPcs-a.totalPcs).slice(0,20).map((s,i)=><tr key={s.sku} onClick={()=>setSel(s.sku)} style={{cursor:'pointer'}}>
          <td style={{fontWeight:800,color:i<3?'var(--accent)':'var(--text2)'}}>{i+1}</td>
          <td className="sku-link">{s.sku}</td>
          <td className="total">{s.totalPcs.toLocaleString()} pcs</td>
          <td>{s.shipments}</td>
          <td>{data[s.sku]?.[0]?.date||'—'}</td>
          <td>{s.lastDate}</td>
        </tr>)}</tbody>
      </table></div></div>
      </div>}
    </div>}

    {/* Admin Tab */}
    {tab==='admin'&&<div>
      {!admin?<div style={{display:'flex',justifyContent:'center',paddingTop:40}}>
        <div className="form-card" style={{textAlign:'center',maxWidth:380}}>
          <div style={{fontSize:48,marginBottom:12}}>🔐</div>
          <h3 style={{justifyContent:'center',marginBottom:4}}>Admin Login</h3>
          <p style={{color:'var(--text2)',fontSize:12,marginBottom:20}}>Enter your credentials to unlock<br/>total shipped & volume data</p>
          {loginErr&&<div style={{background:'rgba(255,69,58,0.1)',border:'1px solid rgba(255,69,58,0.3)',borderRadius:8,padding:'8px 12px',color:'var(--red)',fontSize:12,fontWeight:600,marginBottom:14}}>{loginErr}</div>}
          <div className="field" style={{marginBottom:12,textAlign:'left'}}>
            <label>Username</label>
            <input placeholder="Enter username" value={loginUser} onChange={e=>setLoginUser(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doLogin()} />
          </div>
          <div className="field" style={{marginBottom:16,textAlign:'left'}}>
            <label>Access Code</label>
            <input type="password" placeholder="Enter code" value={loginCode} onChange={e=>setLoginCode(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doLogin()} />
          </div>
          <button className="btn btn-gold" onClick={doLogin} style={{width:'100%',justifyContent:'center'}}>🔓 Unlock Admin</button>
        </div>
      </div>
      :<div style={{display:'flex',justifyContent:'center',paddingTop:40}}>
        <div className="form-card" style={{textAlign:'center',maxWidth:380}}>
          <div style={{fontSize:48,marginBottom:12}}>✅</div>
          <h3 style={{justifyContent:'center',color:'var(--green)',marginBottom:4}}>Admin Active</h3>
          <p style={{color:'var(--text2)',fontSize:12,marginBottom:8}}>You have full access to all data</p>
          <div style={{background:'var(--accentBg)',borderRadius:10,padding:14,marginBottom:16}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div><div style={{fontSize:20,fontWeight:800,color:'var(--accent)'}}>{totals.pcs.toLocaleString()}</div><div style={{fontSize:10,color:'var(--text2)'}}>Total Pieces</div></div>
              <div><div style={{fontSize:20,fontWeight:800,color:'var(--green)'}}>{totals.skus}</div><div style={{fontSize:10,color:'var(--text2)'}}>Active SKUs</div></div>
            </div>
          </div>
          <p style={{color:'var(--text2)',fontSize:11,marginBottom:16}}>🔓 Total shipped & volume columns are now visible across all tabs</p>
          <button className="btn btn-ghost" onClick={doLogout} style={{width:'100%',justifyContent:'center'}}>🔒 Log Out</button>
        </div>
      </div>}
    </div>}

    <div className={'toast'+(toast?' on':'')}>{toast}</div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
