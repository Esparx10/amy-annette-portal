<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Amy & Annette — Reorder Manager</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FAF6F1; --bg2: #F2E8DF; --card: #FFFFFF;
  --accent: #C49A7A; --accent-hover: #A07A5A;
  --gold: #B8963E; --gold-light: #D4B86A;
  --text-dark: #3B2F2F; --text-med: #7A5C4F; --text-light: #A68B7B;
  --border: #E2D4C8; --white: #FFFFFF;
  --error: #B85C4A; --success: #7A9E7E; --blue: #4A7AB5; --orange: #C4833A;
  --font-heading: 'Cormorant Garamond', serif;
  --font-body: 'Jost', sans-serif;
  --radius: 12px; --shadow: 0 1px 4px rgba(59,47,47,0.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: var(--font-body); background: var(--bg); color: var(--text-dark); min-height: 100vh; }

/* HEADER */
.header { background: var(--white); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; position: sticky; top: 0; z-index: 200; }
.header h1 { font-family: var(--font-heading); font-size: 22px; font-weight: 600; flex: 1; }
.header-right { display: flex; align-items: center; gap: 10px; }
.back-btn { padding: 6px 14px; border: 1.5px solid var(--border); border-radius: 8px; background: var(--white); color: var(--text-med); font-family: var(--font-body); font-size: 12px; cursor: pointer; text-decoration: none; }
.back-btn:hover { border-color: var(--accent); color: var(--accent); }
.nav-btn { padding: 6px 14px; border: 1.5px solid var(--gold); border-radius: 8px; background: var(--white); color: var(--gold); font-family: var(--font-body); font-size: 12px; font-weight: 500; cursor: pointer; }
.nav-btn:hover { background: var(--gold); color: var(--white); }
.sku-count { font-size: 11px; color: var(--text-light); }

.container { max-width: 1360px; margin: 0 auto; padding: 20px; }

.btn { padding: 7px 14px; border: none; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; font-family: var(--font-body); }
.btn-gold { background: var(--gold); color: var(--white); }
.btn-gold:hover { background: var(--gold-light); }
.btn-accent { background: var(--accent); color: var(--white); }
.btn-accent:hover { background: var(--accent-hover); }
.btn-green { background: var(--success); color: var(--white); }
.btn-green:hover { opacity: 0.9; }
.btn-orange { background: var(--orange); color: var(--white); }
.btn-orange:hover { opacity: 0.9; }
.btn-red { background: var(--error); color: var(--white); font-size: 14px; padding: 2px 8px; }
.btn-red:hover { opacity: 0.9; }
.btn-outline { background: none; border: 1.5px solid var(--border); color: var(--text-med); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }

/* STATS */
.stats-row { display: flex; gap: 14px; margin-bottom: 16px; }
.stat-box { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; flex: 1; text-align: center; }
.stat-box .num { font-family: var(--font-heading); font-size: 28px; font-weight: 600; }
.stat-box .lbl { font-size: 11px; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

/* ADD BAR */
.add-bar { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 16px; display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
.field { display: flex; flex-direction: column; gap: 3px; position: relative; }
.field label { font-size: 10px; font-weight: 600; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; }
.field input { padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; font-family: var(--font-body); background: var(--white); }
.field input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(184,150,62,0.12); }
.sku-input { width: 200px; font-family: 'JetBrains Mono', 'Courier New', monospace; font-weight: 600; text-transform: uppercase; }
.by-input { width: 120px; }
.notes-input { width: 140px; }

/* AUTOCOMPLETE */
.ac-list { position: absolute; top: 100%; left: 0; width: 360px; background: var(--white); border: 1.5px solid var(--border); border-radius: 0 0 8px 8px; max-height: 220px; overflow-y: auto; z-index: 100; box-shadow: 0 6px 16px rgba(59,47,47,0.12); display: none; }
.ac-list.open { display: block; }
.ac-item { padding: 7px 10px; cursor: pointer; font-size: 12px; display: flex; justify-content: space-between; }
.ac-item:hover, .ac-item.active { background: var(--bg2); }
.ac-sku { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--gold); }
.ac-price { color: var(--success); font-weight: 600; }
.ac-stock { color: var(--text-light); font-size: 11px; }

/* FILTER TABS */
.filter-tabs { display: flex; gap: 4px; margin-bottom: 14px; }
.filter-tab { padding: 6px 14px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--white); cursor: pointer; font-size: 12px; font-weight: 500; color: var(--text-med); font-family: var(--font-body); }
.filter-tab.active { background: var(--gold); color: var(--white); border-color: var(--gold); }
.filter-tab .count { margin-left: 4px; opacity: 0.7; }

/* TABLE */
.card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 8px 8px; background: var(--bg2); font-weight: 600; color: var(--text-light); text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; border-bottom: 1.5px solid var(--border); position: sticky; top: 0; z-index: 1; }
td { padding: 7px 8px; border-bottom: 1px solid var(--bg2); }
tr:hover td { background: #FAF3EC; }
tr.selected td { background: #F5EBD8; }
.table-scroll { max-height: 600px; overflow-y: auto; }
.sku-cell { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--gold); font-size: 12px; }
.inline-num { border: 1.5px solid var(--border); border-radius: 6px; padding: 3px 6px; width: 70px; text-align: center; font-size: 13px; font-weight: 600; font-family: var(--font-body); background: var(--white); }
.inline-num:focus { border-color: var(--gold); outline: none; }
.inline-cost { border: 1.5px solid var(--border); border-radius: 6px; padding: 3px 6px; width: 75px; text-align: right; font-size: 13px; font-family: var(--font-body); }
.inline-cost:focus { border-color: var(--gold); outline: none; }
.inline-notes { border: 1.5px solid var(--border); border-radius: 6px; padding: 3px 6px; width: 100px; font-size: 12px; font-family: var(--font-body); }
.inline-notes:focus { border-color: var(--gold); outline: none; }
.inline-date { border: 1.5px solid var(--border); border-radius: 6px; padding: 3px 6px; font-size: 12px; font-family: var(--font-body); }
.inline-date:focus { border-color: var(--gold); outline: none; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; }
.badge-requested { background: #E8DDD2; color: var(--accent-hover); }
.badge-ordered { background: #F5E6CC; color: var(--orange); }
.badge-received { background: #D8E8DA; color: #4A7A4E; }
.check-col { text-align: center; font-size: 16px; }
.row-check { width: 16px; height: 16px; cursor: pointer; accent-color: var(--gold); }

/* BOTTOM BAR */
.bottom-bar { display: flex; gap: 10px; margin-top: 14px; align-items: center; flex-wrap: wrap; }
.bottom-bar .spacer { flex: 1; }
.selection-info { font-size: 12px; color: var(--gold); font-weight: 600; }
.empty-msg { text-align: center; padding: 40px; color: var(--text-light); font-size: 14px; }

/* LOADING */
.loading { text-align: center; padding: 60px; color: var(--text-light); }
.loading .spin { display: inline-block; width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <h1>Reorder Manager</h1>
  <div class="header-right">
    <span class="sku-count" id="skuCount">Loading...</span>
    <button class="nav-btn" onclick="document.getElementById('priceFile').click()">Update Prices</button>
    <input type="file" id="priceFile" accept=".csv,.xlsx,.xls" style="display:none" onchange="uploadPriceFile(this.files[0])">
    <a href="index.html" class="back-btn">Back to Portal</a>
  </div>
</div>

<div class="container">
  <div id="loadingScreen" class="loading"><div class="spin"></div><br>Initializing database...</div>

  <div id="mainContent" style="display:none">
    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-box"><div class="num" style="color:var(--accent)" id="statRequested">0</div><div class="lbl">Requested</div></div>
      <div class="stat-box"><div class="num" style="color:var(--orange)" id="statOrdered">0</div><div class="lbl">On Order</div></div>
      <div class="stat-box"><div class="num" style="color:var(--success)" id="statReceived">0</div><div class="lbl">Received</div></div>
    </div>

    <!-- Add SKU -->
    <div class="add-bar">
      <div class="field" style="position:relative">
        <label>SKU</label>
        <input type="text" class="sku-input" id="addSku" placeholder="Type SKU..." autocomplete="off"
          oninput="onSkuInput(this.value)" onkeydown="onSkuKeydown(event)"
          onfocus="onSkuInput(this.value)" onblur="setTimeout(closeAc,150)">
        <div class="ac-list" id="acList"></div>
      </div>
      <div class="field">
        <label>Requested By</label>
        <input type="text" class="by-input" id="addBy" placeholder="Name" onkeydown="if(event.key==='Enter'){event.preventDefault();addToList();}">
      </div>
      <div class="field">
        <label>Notes</label>
        <input type="text" class="notes-input" id="addNotes" placeholder="Optional" onkeydown="if(event.key==='Enter'){event.preventDefault();addToList();}">
      </div>
      <button class="btn btn-gold" onclick="addToList()">Add to List</button>
    </div>

    <!-- Filter Tabs -->
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="setFilter('all',this)">All</button>
      <button class="filter-tab" onclick="setFilter('Requested',this)">Requested <span class="count" id="filterRequested"></span></button>
      <button class="filter-tab" onclick="setFilter('Ordered',this)">On Order <span class="count" id="filterOrdered"></span></button>
      <button class="filter-tab" onclick="setFilter('Received',this)">Received <span class="count" id="filterReceived"></span></button>
    </div>

    <!-- Order Table -->
    <div class="card">
      <div class="table-scroll">
        <table>
          <thead><tr>
            <th style="width:30px"><input type="checkbox" class="row-check" id="selectAll" onchange="toggleSelectAll(this.checked)"></th>
            <th>SKU</th><th>Item Name</th><th style="text-align:center">On Order?</th>
            <th>Requested By</th><th style="text-align:center">Times</th><th style="text-align:center">Stock</th>
            <th style="text-align:center">Suggested Qty</th><th style="text-align:center">Production Qty</th>
            <th style="text-align:right">Original Cost</th><th style="text-align:right">New Cost</th>
            <th>Status</th><th>Date Ordered</th><th>Notes</th><th></th>
          </tr></thead>
          <tbody id="orderBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Bottom -->
    <div class="bottom-bar">
      <span style="font-size:12px;color:var(--text-light)" id="rowCount"></span>
      <span class="selection-info" id="selectionInfo"></span>
      <div class="spacer"></div>
      <button class="btn btn-outline" onclick="copyList()">Copy SKU List</button>
      <button class="btn btn-accent" onclick="downloadTxt()">Download .txt</button>
      <button class="btn btn-green" onclick="downloadExcel()">Download Excel</button>
    </div>
  </div>
</div>

<script>
// ─── DATABASE ───
const DB_NAME = 'reorder_manager_db';
const DB_STORE = 'sqlitedb';
let db = null;
let currentFilter = 'all';
let selectedIds = new Set();
let acMatches = [];
let acIndex = -1;

function saveDB() {
  return new Promise((resolve, reject) => {
    const data = db.export();
    const buffer = new Uint8Array(data);
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(DB_STORE);
    req.onsuccess = e => {
      const tx = e.target.result.transaction(DB_STORE, 'readwrite');
      tx.objectStore(DB_STORE).put(buffer, 'db');
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    };
    req.onerror = () => reject(req.error);
  });
}

function loadDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(DB_STORE);
    req.onsuccess = e => {
      const tx = e.target.result.transaction(DB_STORE, 'readonly');
      const get = tx.objectStore(DB_STORE).get('db');
      get.onsuccess = () => resolve(get.result || null);
      get.onerror = () => reject(get.error);
    };
    req.onerror = () => reject(req.error);
  });
}

async function initDatabase() {
  const SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${f}` });

  const saved = await loadDB();
  if (saved) {
    db = new SQL.Database(saved);
  } else {
    db = new SQL.Database();
  }

  db.run(`CREATE TABLE IF NOT EXISTS sku_pricelist (
    sku TEXT PRIMARY KEY, item_name TEXT DEFAULT '', stock REAL DEFAULT 0, price REAL DEFAULT 0
  )`);
  db.run(`CREATE TABLE IF NOT EXISTS order_list (
    id INTEGER PRIMARY KEY AUTOINCREMENT,
    sku TEXT NOT NULL, requested_by TEXT DEFAULT '', times_requested INTEGER DEFAULT 1,
    current_stock REAL DEFAULT 0, suggested_qty INTEGER DEFAULT 0, production_qty INTEGER DEFAULT 0,
    original_cost REAL DEFAULT 0, new_cost REAL DEFAULT 0,
    status TEXT DEFAULT 'Requested', notes TEXT DEFAULT '',
    created_at TEXT, ordered_at TEXT, received_at TEXT
  )`);

  // Check if pricelist is empty → import from JSON
  const count = db.exec(`SELECT COUNT(*) FROM sku_pricelist`);
  const plCount = count[0]?.values[0][0] || 0;
  if (plCount === 0) {
    try {
      const resp = await fetch('sku-data.json');
      if (resp.ok) {
        const rows = await resp.json();
        for (const [sku, stock, price] of rows) {
          db.run(`INSERT OR REPLACE INTO sku_pricelist (sku, stock, price) VALUES (?, ?, ?)`, [sku, stock, price]);
        }
        await saveDB();
        console.log(`Imported ${rows.length} SKUs`);
      }
    } catch (e) { console.log('No sku-data.json found'); }
  }

  const plResult = db.exec(`SELECT COUNT(*) FROM sku_pricelist`);
  const total = plResult[0]?.values[0][0] || 0;
  document.getElementById('skuCount').textContent = total ? `${total.toLocaleString()} SKUs` : 'No price list';

  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('mainContent').style.display = '';
  loadOrders();
  document.getElementById('addSku').focus();
}

// ─── QUERY HELPERS ───
function queryAll(sql) {
  const data = db.exec(sql);
  if (!data.length) return [];
  const cols = data[0].columns;
  return data[0].values.map(row => { const o = {}; cols.forEach((c, i) => o[c] = row[i]); return o; });
}

function today() { return new Date().toISOString().split('T')[0]; }

// ─── LOAD & RENDER ───
function loadStats() {
  const r = db.exec(`SELECT status, COUNT(*) as c FROM order_list GROUP BY status`);
  const counts = { Requested: 0, Ordered: 0, Received: 0 };
  if (r.length) r[0].values.forEach(v => counts[v[0]] = v[1]);
  document.getElementById('statRequested').textContent = counts.Requested;
  document.getElementById('statOrdered').textContent = counts.Ordered;
  document.getElementById('statReceived').textContent = counts.Received;
  document.getElementById('filterRequested').textContent = counts.Requested ? `(${counts.Requested})` : '';
  document.getElementById('filterOrdered').textContent = counts.Ordered ? `(${counts.Ordered})` : '';
  document.getElementById('filterReceived').textContent = counts.Received ? `(${counts.Received})` : '';
}

function loadOrders() {
  let sql = `SELECT ol.*, COALESCE(sp.item_name, '') as item_name
    FROM order_list ol LEFT JOIN sku_pricelist sp ON ol.sku = sp.sku`;
  if (currentFilter !== 'all') sql += ` WHERE ol.status = '${currentFilter}'`;
  sql += ` ORDER BY CASE ol.status WHEN 'Requested' THEN 0 WHEN 'Ordered' THEN 1 WHEN 'Received' THEN 2 END, ol.created_at DESC`;

  const orders = queryAll(sql);
  renderTable(orders);
  loadStats();
}

function renderTable(orders) {
  const tbody = document.getElementById('orderBody');
  if (!orders.length) {
    tbody.innerHTML = `<tr><td colspan="15" class="empty-msg">No items yet. Add SKUs above to get started.</td></tr>`;
    document.getElementById('rowCount').textContent = '';
    updateSelectionInfo();
    return;
  }

  tbody.innerHTML = orders.map(o => {
    const isReq = o.status === 'Requested';
    const isOrd = o.status === 'Ordered';
    const isRcv = o.status === 'Received';
    const stockClass = o.current_stock > 0 ? 'color:var(--success)' : 'color:var(--error)';
    const badgeClass = isReq ? 'badge-requested' : isOrd ? 'badge-ordered' : 'badge-received';
    const checked = selectedIds.has(o.id) ? 'checked' : '';
    const rowClass = selectedIds.has(o.id) ? 'selected' : '';
    const ordDate = o.ordered_at ? (o.ordered_at.split(' ')[0] || o.ordered_at.split('T')[0]) : '';

    let actions = '';
    if (isReq) actions = `<button class="btn btn-orange" onclick="markOrdered(${o.id})" title="Mark Ordered">Order</button> <button class="btn btn-red" onclick="deleteItem(${o.id})">&times;</button>`;
    else if (isOrd) actions = `<button class="btn btn-green" onclick="markReceived(${o.id})">Recv</button> <button class="btn btn-red" onclick="deleteItem(${o.id})">&times;</button>`;

    return `<tr class="${rowClass}">
      <td><input type="checkbox" class="row-check" ${checked} onchange="toggleSelect(${o.id},this.checked)"></td>
      <td class="sku-cell">${o.sku}</td>
      <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px" title="${o.item_name}">${o.item_name}</td>
      <td class="check-col">${isOrd ? '<span style="color:var(--orange)">&#10003;</span>' : isRcv ? '<span style="color:var(--success)">&#10003;</span>' : ''}</td>
      <td style="font-size:12px">${o.requested_by || ''}</td>
      <td style="text-align:center;font-weight:700">${o.times_requested || 1}</td>
      <td style="text-align:center"><span style="${stockClass};font-size:12px;font-weight:600">${o.current_stock > 0 ? Math.floor(o.current_stock) : 'OOS'}</span></td>
      <td style="text-align:center">${isReq ? `<input class="inline-num" type="number" value="${o.suggested_qty || ''}" placeholder="0" onchange="updateItem(${o.id},'suggested_qty',this.value)">` : (o.suggested_qty || '-')}</td>
      <td style="text-align:center">${isReq || isOrd ? `<input class="inline-num" type="number" value="${o.production_qty || ''}" placeholder="0" onchange="updateItem(${o.id},'production_qty',this.value)">` : (o.production_qty || '-')}</td>
      <td style="text-align:right;font-size:12px;color:var(--text-light)">${o.original_cost ? '$' + o.original_cost.toFixed(2) : '-'}</td>
      <td style="text-align:right">${isReq || isOrd ? `<input class="inline-cost" type="number" step="0.01" value="${o.new_cost || ''}" placeholder="$0.00" onchange="updateItem(${o.id},'new_cost',this.value)">` : (o.new_cost ? '$' + o.new_cost.toFixed(2) : '-')}</td>
      <td><span class="badge ${badgeClass}">${o.status}</span></td>
      <td>${isReq ? `<input class="inline-date" type="date" value="${today()}" id="date-${o.id}">` : (isOrd ? `<span style="font-size:12px">${ordDate}</span>` : (ordDate ? `<span style="font-size:12px;color:var(--text-light)">${ordDate}</span>` : ''))}</td>
      <td>${isReq || isOrd ? `<input class="inline-notes" type="text" value="${(o.notes || '').replace(/"/g,'&quot;')}" placeholder="..." onchange="updateItem(${o.id},'notes',this.value)">` : (o.notes || '')}</td>
      <td style="white-space:nowrap">${actions}</td>
    </tr>`;
  }).join('');

  document.getElementById('rowCount').textContent = `${orders.length} items`;
  updateSelectionInfo();
}

// ─── SELECTION ───
function toggleSelect(id, checked) {
  if (checked) selectedIds.add(id); else selectedIds.delete(id);
  loadOrders();
}

function toggleSelectAll(checked) {
  const rows = document.querySelectorAll('#orderBody .row-check');
  rows.forEach(cb => {
    const id = parseInt(cb.onchange.toString().match(/toggleSelect\((\d+)/)?.[1]);
    if (id) { if (checked) selectedIds.add(id); else selectedIds.delete(id); }
  });
  loadOrders();
}

function updateSelectionInfo() {
  const el = document.getElementById('selectionInfo');
  el.textContent = selectedIds.size ? `${selectedIds.size} selected` : '';
}

// ─── ACTIONS ───
function addToList() {
  const skuInput = document.getElementById('addSku');
  const sku = skuInput.value.trim().toUpperCase();
  if (!sku) { skuInput.focus(); return; }
  const by = document.getElementById('addBy').value.trim();
  const notes = document.getElementById('addNotes').value.trim();

  // Check duplicate
  const existing = db.exec(`SELECT id, times_requested, requested_by FROM order_list WHERE sku = '${sku.replace(/'/g,"''")}' AND status = 'Requested'`);
  if (existing.length && existing[0].values.length) {
    const [id, times, oldBy] = existing[0].values[0];
    const newBy = by ? (oldBy ? oldBy + ', ' + by : by) : oldBy;
    db.run(`UPDATE order_list SET times_requested = ?, requested_by = ? WHERE id = ?`, [times + 1, newBy, id]);
  } else {
    const pl = db.exec(`SELECT stock, price FROM sku_pricelist WHERE sku = '${sku.replace(/'/g,"''")}'`);
    const stock = pl.length && pl[0].values.length ? pl[0].values[0][0] || 0 : 0;
    const price = pl.length && pl[0].values.length ? pl[0].values[0][1] || 0 : 0;
    db.run(`INSERT INTO order_list (sku, requested_by, current_stock, original_cost, notes, created_at) VALUES (?, ?, ?, ?, ?, ?)`,
      [sku, by, stock, price, notes, new Date().toISOString()]);
  }

  saveDB();
  skuInput.value = ''; document.getElementById('addNotes').value = '';
  closeAc(); skuInput.focus();
  loadOrders();
}

function updateItem(id, field, value) {
  if (field === 'production_qty' || field === 'suggested_qty') value = parseInt(value) || 0;
  else if (field === 'new_cost') value = parseFloat(value) || 0;
  db.run(`UPDATE order_list SET ${field} = ? WHERE id = ?`, [value, id]);
  saveDB();
}

function markOrdered(id) {
  const dateInput = document.getElementById('date-' + id);
  const dateVal = dateInput ? dateInput.value : today();
  db.run(`UPDATE order_list SET status = 'Ordered', ordered_at = ? WHERE id = ? AND status = 'Requested'`, [dateVal, id]);
  saveDB(); loadOrders();
}

function markReceived(id) {
  db.run(`UPDATE order_list SET status = 'Received', received_at = ? WHERE id = ? AND status = 'Ordered'`, [new Date().toISOString(), id]);
  saveDB(); loadOrders();
}

function deleteItem(id) {
  if (!confirm('Remove this item?')) return;
  db.run(`DELETE FROM order_list WHERE id = ? AND status != 'Received'`, [id]);
  selectedIds.delete(id);
  saveDB(); loadOrders();
}

function setFilter(status, btn) {
  currentFilter = status;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  loadOrders();
}

// ─── AUTOCOMPLETE ───
function onSkuInput(val) {
  val = val.trim().toUpperCase();
  const list = document.getElementById('acList');
  if (!val || val.length < 2) { list.classList.remove('open'); acMatches = []; acIndex = -1; return; }

  const data = db.exec(`SELECT sku, item_name, stock, price FROM sku_pricelist WHERE sku LIKE '${val.replace(/'/g,"''")}%' ORDER BY sku LIMIT 12`);
  acMatches = data.length ? data[0].values.map(r => ({ sku: r[0], name: r[1] || '', stock: r[2] || 0, price: r[3] || 0 })) : [];

  // Add substring matches
  if (acMatches.length < 12) {
    const existing = new Set(acMatches.map(r => r.sku));
    const more = db.exec(`SELECT sku, item_name, stock, price FROM sku_pricelist WHERE sku LIKE '%${val.replace(/'/g,"''")}%' AND sku NOT LIKE '${val.replace(/'/g,"''")}%' ORDER BY sku LIMIT ${12 - acMatches.length}`);
    if (more.length) more[0].values.forEach(r => { if (!existing.has(r[0])) acMatches.push({ sku: r[0], name: r[1] || '', stock: r[2] || 0, price: r[3] || 0 }); });
  }

  acIndex = -1;
  if (!acMatches.length) { list.classList.remove('open'); return; }

  list.innerHTML = acMatches.map((s, i) => `<div class="ac-item" onmousedown="selectAc(${i})">
    <span class="ac-sku">${s.sku}</span>
    <span>${s.price ? '<span class="ac-price">$' + s.price.toFixed(2) + '</span>' : ''} <span class="ac-stock">${s.stock > 0 ? Math.floor(s.stock) + ' on hand' : 'OOS'}</span></span>
  </div>`).join('');
  list.classList.add('open');
}

function onSkuKeydown(e) {
  const list = document.getElementById('acList');
  if (!list.classList.contains('open')) { if (e.key === 'Enter') { e.preventDefault(); addToList(); } return; }
  if (e.key === 'ArrowDown') { e.preventDefault(); acIndex = Math.min(acIndex + 1, acMatches.length - 1); highlightAc(); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); acIndex = Math.max(acIndex - 1, 0); highlightAc(); }
  else if (e.key === 'Enter' || e.key === 'Tab') { if (acIndex >= 0) { e.preventDefault(); selectAc(acIndex); } else if (e.key === 'Enter') { e.preventDefault(); closeAc(); addToList(); } }
  else if (e.key === 'Escape') closeAc();
}

function highlightAc() {
  document.querySelectorAll('.ac-item').forEach((el, i) => el.classList.toggle('active', i === acIndex));
  const a = document.querySelector('.ac-item.active'); if (a) a.scrollIntoView({ block: 'nearest' });
}

function selectAc(i) {
  if (!acMatches[i]) return;
  document.getElementById('addSku').value = acMatches[i].sku;
  closeAc(); document.getElementById('addBy').focus();
}

function closeAc() { document.getElementById('acList').classList.remove('open'); acMatches = []; acIndex = -1; }

// ─── UPLOAD PRICES ───
function uploadPriceFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
      if (!rows.length) return alert('Empty file');

      const header = rows[0].map(h => (h || '').toString().toLowerCase().trim());
      let skuCol = 0, qtyCol = 1, priceCol = 2;
      const si = header.findIndex(h => h.includes('sku') || h.includes('entry name'));
      const qi = header.findIndex(h => h.includes('quantity') || h.includes('qty'));
      const pi = header.findIndex(h => h.includes('price') || h.includes('cost'));
      if (si >= 0) skuCol = si; if (qi >= 0) qtyCol = qi; if (pi >= 0) priceCol = pi;

      db.run(`DELETE FROM sku_pricelist`);
      let count = 0;
      for (let i = 1; i < rows.length; i++) {
        const row = rows[i];
        const sku = (row[skuCol] || '').toString().trim().toUpperCase();
        if (!sku || sku === 'JEWELRY' || sku === 'TOYS') continue;
        db.run(`INSERT OR REPLACE INTO sku_pricelist (sku, stock, price) VALUES (?, ?, ?)`,
          [sku, parseFloat(row[qtyCol]) || 0, parseFloat(row[priceCol]) || 0]);
        count++;
      }
      saveDB();
      document.getElementById('skuCount').textContent = `${count.toLocaleString()} SKUs`;
      alert(`Imported ${count} SKUs`);
    } catch (err) { alert('Error: ' + err.message); }
  };
  reader.readAsArrayBuffer(file);
}

// ─── EXPORT ───
function downloadExcel() {
  let sql = `SELECT ol.*, COALESCE(sp.item_name, '') as item_name
    FROM order_list ol LEFT JOIN sku_pricelist sp ON ol.sku = sp.sku`;
  if (currentFilter !== 'all') sql += ` WHERE ol.status = '${currentFilter}'`;
  sql += ` ORDER BY ol.created_at DESC`;
  let orders = queryAll(sql);

  // Filter to selected only if any are selected
  if (selectedIds.size > 0) {
    orders = orders.filter(o => selectedIds.has(o.id));
  }
  if (!orders.length) return alert('No items to export');

  const date = today();
  const wsData = [
    ['REORDER LIST — ' + date],
    [],
    ['SKU', 'Item Name', 'On Order?', 'Requested By', 'Times Requested', 'Current Stock',
     'Suggested Qty', 'Production Qty', 'Original Cost', 'New Cost', 'Status', 'Date Ordered', 'Notes'],
  ];
  for (const o of orders) {
    const ordDate = o.ordered_at ? (o.ordered_at.split(' ')[0] || o.ordered_at.split('T')[0]) : '';
    wsData.push([o.sku, o.item_name || '', o.status === 'Ordered' ? 'Yes' : '', o.requested_by || '',
      o.times_requested || 1, o.current_stock || 0, o.suggested_qty || '', o.production_qty || '',
      o.original_cost || '', o.new_cost || '', o.status, ordDate, o.notes || '']);
  }
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols'] = [{wch:18},{wch:24},{wch:10},{wch:14},{wch:6},{wch:8},{wch:10},{wch:12},{wch:10},{wch:10},{wch:10},{wch:12},{wch:20}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Reorder List');
  XLSX.writeFile(wb, `Reorder-List-${date}.xlsx`);
}

function getExportOrders() {
  let sql = `SELECT ol.*, COALESCE(sp.item_name, '') as item_name
    FROM order_list ol LEFT JOIN sku_pricelist sp ON ol.sku = sp.sku`;
  if (currentFilter !== 'all') sql += ` WHERE ol.status = '${currentFilter}'`;
  let orders = queryAll(sql);
  if (selectedIds.size > 0) orders = orders.filter(o => selectedIds.has(o.id));
  return orders;
}

function copyList() {
  const orders = getExportOrders();
  if (!orders.length) return alert('No items to copy');

  let text = '';
  for (const o of orders) {
    const qty = o.production_qty || o.suggested_qty || 0;
    text += `${o.sku} - ${qty}\n`;
  }
  navigator.clipboard.writeText(text.trim()).then(() => {
    const btn = document.querySelector('[onclick="copyList()"]');
    btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = 'Copy SKU List', 1500);
  });
}

function downloadTxt() {
  const orders = getExportOrders();
  if (!orders.length) return alert('No items to export');

  let text = '';
  for (const o of orders) {
    const qty = o.production_qty || o.suggested_qty || 0;
    text += `${o.sku} - ${qty}\n`;
  }
  const blob = new Blob([text], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `Reorder-List-${today()}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

// ─── INIT ───
initDatabase().catch(e => { console.error(e); document.getElementById('loadingScreen').innerHTML = 'Error: ' + e.message; });
</script>
